<!-- EN / index.html -->
<EN>

  <!-- ========================= -->
  <!--  LOAD (EU‑ENG‑GB MODE)   -->
  <!-- ========================= -->
  <LOAD mode="EU‑ENG‑GB">

    <!-- IDENTITY -->
    <ID src="ID.html" />

    <!-- CORE MODULES -->
    <MODULE src="DATA/" type="core" />
    <MODULE src="EX/" type="core" />

    <!-- HH – HOST HUB (FULL SHOW) -->
    <MODULE src="HH/" bind="EN→HH" mode="visual" />

    <!-- ROOT / API / ANKER / OUT -->
    <MODULE src="ROOT/" />
    <MODULE src="API/" />
    <MODULE src="ANKER/" />
    <MODULE src="OUT/" />

  </LOAD>


  <!-- ========================= -->
  <!--  SYSTEM (EN‑CORE)        -->
  <!-- ========================= -->
  <SYSTEM>
    <NAME>EN</NAME>
    <INSTANCE>ENG‑CORE</INSTANCE>
    <SIGNATURE>EU.eng.gb</SIGNATURE>
    <MODE>standalone</MODE>
    <STATUS>active</STATUS>

    <!-- HH‑BINDUNG -->
    <HOST>
      <TARGET>HH</TARGET>
      <LINK>EN→HH</LINK>
      <STATE>connected</STATE>
      <LEVEL>full‑visual</LEVEL>
    </HOST>
  </SYSTEM>


  <!-- ========================= -->
  <!--  RUN (BOOT + LIVE)       -->
  <!-- ========================= -->
  <RUN>
    <BOOT src="RUN.boot" mode="cold‑start" />
    <LIVE src="RUN/" mode="continuous" />
  </RUN>


  <!-- ========================= -->
  <!--  DISPLAY (FULL HH SHOW)  -->
  <!-- ========================= -->
  <DISPLAY>

    <!-- HH STATUS -->
    <STATUS src="HH/status" mode="live" />

    <!-- HH VECTOR -->
    <VECTOR src="HH/vector" mode="dynamic" />

    <!-- HH ROOM -->
    <ROOM src="HH/room" mode="bind" />

    <!-- HH ACTIVATE -->
